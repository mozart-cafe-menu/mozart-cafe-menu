<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mozart Café — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0c0a08;
      --bg2:    #111009;
      --bg3:    #181612;
      --card:   rgba(255,255,255,0.04);
      --gold:   #c8a44e;
      --gold-l: #e2c278;
      --gold-d: #9a7a35;
      --cream:  #f4ead2;
      --muted:  rgba(244,234,210,0.50);
      --border: rgba(200,164,78,0.16);
      --bord2:  rgba(200,164,78,0.34);
      --green:  #7ebd6a;
      --red:    #e05252;
      --tr:     0.25s cubic-bezier(0.4,0,0.2,1);
      --r:      16px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { overflow-x:hidden; }
    body { background:var(--bg); color:var(--cream); font-family:'Outfit',sans-serif; font-weight:300; min-height:100vh; }
    button { font-family:inherit; cursor:pointer; border:none; background:none; }
    input, textarea, select { font-family:inherit; }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }

    /* ── LOGIN ── */
    #login-screen {
      position:fixed; inset:0; background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; padding:24px;
    }
    #login-screen.hidden { display:none; }
    .login-box {
      width:100%; max-width:360px;
      background:var(--bg3); border:1px solid var(--bord2); border-radius:24px;
      padding:36px 28px; text-align:center;
    }
    .login-logo { font-family:'Cormorant',serif; font-size:1.8rem; color:var(--gold); letter-spacing:0.12em; margin-bottom:4px; }
    .login-sub  { font-size:0.75rem; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:28px; }
    .login-input {
      width:100%; background:var(--card); border:1px solid var(--bord2); border-radius:12px;
      padding:13px 16px; color:var(--cream); font-size:1rem; outline:none; transition:border-color 0.2s;
      margin-bottom:14px; letter-spacing:0.1em;
    }
    .login-input:focus { border-color:var(--gold); }
    .login-btn {
      width:100%; padding:14px;
      background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));
      border-radius:12px; color:#0c0a08; font-size:0.9rem; font-weight:600; letter-spacing:0.06em;
      transition:all 0.28s;
    }
    .login-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(200,164,78,0.38); }
    .login-err { font-size:0.78rem; color:var(--red); margin-top:10px; min-height:18px; }

    /* ── HEADER ── */
    .adm-header {
      background:rgba(12,10,8,0.95); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:8px 16px; position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      flex-wrap:wrap;
    }
    .adm-logo { font-family:'Cormorant',serif; font-size:1.1rem; color:var(--gold); letter-spacing:0.1em; }
    .adm-sub  { font-size:0.62rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); }
    .adm-center {
      display:flex; align-items:center; gap:8px; flex:1;
      justify-content:center; flex-wrap:wrap;
    }
    .adm-right { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .btn-preview {
      padding:7px 12px; border:1px solid var(--bord2); border-radius:10px;
      color:var(--muted); font-size:0.75rem; transition:var(--tr); white-space:nowrap;
      min-height:34px;
    }
    .btn-preview:hover { border-color:var(--gold); color:var(--gold); }
    .btn-logout {
      padding:7px 12px; border:1px solid rgba(224,82,82,0.3); border-radius:10px;
      color:var(--red); font-size:0.75rem; opacity:0.7; transition:var(--tr); white-space:nowrap;
      min-height:34px;
    }
    .btn-logout:hover { opacity:1; border-color:var(--red); }
    @media(max-width:600px) {
      .adm-sub { display:none; }
      .btn-preview { padding:7px 8px; font-size:0.9rem; }
      .adm-center { order:3; width:100%; justify-content:flex-start; }
    }

    /* ── SAVED TOAST ── */
    #toast {
      position:fixed; bottom:110px; left:50%;
      transform:translateX(-50%) translateY(0);
      background:var(--bg3); border:1px solid var(--bord2); border-radius:12px;
      padding:12px 22px; font-size:0.84rem; color:var(--green);
      box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:8000;
      display:flex; align-items:center; gap:8px; white-space:nowrap;
      max-width:calc(100vw - 32px);
      opacity:0; pointer-events:none;
      transition:opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    #toast.show { opacity:1; pointer-events:none; transform:translateX(-50%) translateY(-8px); }

    /* ── MAIN LAYOUT ── */
    .adm-wrap { max-width:900px; margin:0 auto; padding:20px 16px 90px; }
    @media(min-width:900px) { .adm-wrap { padding:28px 24px 90px; } }

    /* ── SECTION ── */
    .adm-section { margin-bottom:32px; }
    .sec-hd {
      font-family:'Cormorant',serif; font-size:1.2rem; font-weight:600;
      color:var(--cream); padding-bottom:12px; margin-bottom:16px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .sec-badge {
      font-family:'Outfit',sans-serif; font-size:0.66rem; font-weight:500;
      padding:4px 11px; border-radius:10px; letter-spacing:0.06em;
      background:rgba(200,164,78,0.1); color:var(--gold); border:1px solid var(--bord2);
    }

    /* ── INFO CARD (WiFi, Horaires, Adresse) ── */
    .info-card {
      background:var(--card); border:1px solid var(--border); border-radius:var(--r);
      overflow:hidden;
    }
    .info-row {
      display:grid; grid-template-columns:140px 1fr;
      border-bottom:1px solid var(--border);
    }
    .info-row:last-child { border-bottom:none; }
    .info-lbl {
      padding:14px 16px; font-size:0.78rem; color:var(--muted);
      border-right:1px solid var(--border); display:flex; align-items:center;
    }
    .info-inputs { padding:8px 12px; display:flex; flex-direction:column; gap:6px; }
    .info-input {
      background:transparent; border:none; border-bottom:1px solid transparent;
      color:var(--cream); font-size:0.84rem; padding:8px 4px; outline:none;
      transition:border-color 0.2s; width:100%; min-height:38px;
    }
    .info-input:focus { border-color:var(--gold); }
    @media(max-width:560px) {
      .info-row { grid-template-columns:1fr; }
      .info-lbl { border-right:none; border-bottom:1px solid var(--border); padding:10px 14px 8px; font-size:0.72rem; }
      .info-inputs { padding:6px 14px 10px; }
    }

    /* ── CATEGORIES ── */
    .cats-list { display:flex; flex-direction:column; gap:8px; }
    .cat-row {
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      padding:12px 14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    }
    .cat-row-ico { color:var(--gold); flex-shrink:0; }
    .cat-row-ico svg { width:18px; height:18px; }
    .inline-input {
      flex:1; min-width:100px; background:transparent; border:none; border-bottom:1px solid transparent;
      color:var(--cream); font-size:0.88rem; padding:6px 2px; outline:none; transition:border-color 0.2s;
    }
    .inline-input:focus { border-color:var(--gold); }
    .icon-select {
      background:var(--bg3); border:1px solid var(--bord2); border-radius:8px;
      color:var(--cream); font-size:0.76rem; padding:7px 8px; outline:none;
      min-height:36px;
    }
    .btn-del {
      width:36px; height:36px; flex-shrink:0;
      border:1px solid rgba(224,82,82,0.3); border-radius:8px;
      color:var(--red); opacity:0.6; font-size:1.1rem; font-weight:300;
      display:flex; align-items:center; justify-content:center; transition:var(--tr);
    }
    .btn-del:hover { opacity:1; border-color:var(--red); background:rgba(224,82,82,0.06); }
    .btn-add {
      width:100%; padding:14px; margin-top:8px;
      border:1px dashed var(--bord2); border-radius:14px;
      color:var(--gold); font-size:0.84rem; letter-spacing:0.04em;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:var(--tr); min-height:48px;
    }
    .btn-add:hover { background:rgba(200,164,78,0.04); border-color:var(--gold); }

    /* ── PRODUCTS ── */
    .cat-products { margin-bottom:28px; }
    .cat-products-hd {
      display:flex; align-items:center; gap:10px; padding:16px 0 10px;
    }
    .cat-products-name {
      font-family:'Cormorant',serif; font-size:1.05rem; font-weight:600; color:var(--cream);
    }
    .products-list { display:flex; flex-direction:column; gap:10px; }

    /* Product card in admin */
    .prod-card {
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      overflow:hidden;
    }
    .prod-card-top {
      display:flex; align-items:center; gap:12px; padding:14px;
      cursor:pointer; user-select:none; min-height:70px;
    }
    .prod-thumb {
      width:56px; height:56px; border-radius:10px; object-fit:cover; flex-shrink:0;
      background:var(--bg3);
    }
    .prod-top-info { flex:1; min-width:0; }
    .prod-top-name { font-size:0.92rem; font-weight:400; color:var(--cream); }
    .prod-top-price { font-size:0.78rem; color:var(--gold); margin-top:3px; }
    .prod-expand-ico { color:var(--muted); transition:transform 0.3s; flex-shrink:0; }
    .prod-expand-ico svg { width:18px; height:18px; }
    .prod-card.open .prod-expand-ico { transform:rotate(180deg); }
    .prod-card-body {
      display:none; padding:0 14px 18px;
      border-top:1px solid var(--border);
    }
    .prod-card.open .prod-card-body { display:block; }

    /* Form grid */
    .form-grid { display:grid; gap:14px; padding-top:14px; }
    .form-grid-2 { grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:480px) { .form-grid-2 { grid-template-columns:1fr; } }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-lbl { font-size:0.71rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
    .form-input, .form-textarea, .form-select {
      background:rgba(255,255,255,0.05); border:1px solid var(--bord2); border-radius:10px;
      color:var(--cream); font-size:0.9rem; padding:12px 14px; outline:none; transition:border-color 0.2s; width:100%;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color:var(--gold); }
    .form-textarea { resize:vertical; min-height:86px; line-height:1.6; }
    .form-select option { background:#181612; }

    /* Photo preview */
    .photo-preview {
      width:100%; height:160px; border-radius:12px; object-fit:cover;
      border:1px solid var(--bord2); background:var(--bg3); margin-top:6px;
    }
    .photo-help { font-size:0.72rem; color:var(--muted); margin-top:6px; line-height:1.55; }
    .photo-help a { color:var(--gold); }

    /* Photo upload button */
    .photo-upload-row { display:flex; gap:8px; margin-top:8px; }
    .btn-upload-photo {
      flex:1; padding:10px 14px; border-radius:10px;
      border:1px solid var(--bord2); background:rgba(255,255,255,0.04);
      color:var(--muted); font-size:0.82rem;
      display:flex; align-items:center; justify-content:center; gap:7px;
      transition:var(--tr); cursor:pointer; min-height:42px;
    }
    .btn-upload-photo:hover { border-color:var(--gold); color:var(--gold); background:rgba(200,164,78,0.05); }
    .btn-clear-photo {
      width:42px; height:42px; border-radius:10px;
      border:1px solid rgba(224,82,82,0.3); background:none;
      color:var(--red); font-size:1rem; opacity:0.7;
      display:flex; align-items:center; justify-content:center;
      transition:var(--tr); cursor:pointer; flex-shrink:0;
    }
    .btn-clear-photo:hover { opacity:1; border-color:var(--red); background:rgba(224,82,82,0.06); }
    input.photo-file-input { display:none; }

    /* Badges checkboxes */
    .badges-wrap { display:flex; flex-wrap:wrap; gap:8px; }
    .badge-chk { display:flex; align-items:center; gap:5px; cursor:pointer; }
    .badge-chk input { display:none; }
    .badge-pill {
      font-size:0.74rem; font-weight:500; padding:7px 14px; border-radius:20px;
      border:1px solid var(--border); color:var(--muted); transition:var(--tr);
      min-height:34px; display:flex; align-items:center;
    }
    .badge-chk input:checked + .badge-pill { border-color:var(--gold); color:var(--gold); background:rgba(200,164,78,0.1); }

    /* Product action buttons */
    .prod-actions { display:flex; gap:8px; margin-top:16px; }
    .btn-save-prod {
      flex:1; padding:10px;
      background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));
      border-radius:10px; color:#0c0a08; font-size:0.84rem; font-weight:600;
      transition:all 0.25s;
    }
    .btn-save-prod:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(200,164,78,0.35); }
    .btn-del-prod {
      padding:10px 16px;
      border:1px solid rgba(224,82,82,0.35); border-radius:10px;
      color:var(--red); font-size:0.84rem; opacity:0.75; transition:var(--tr);
    }
    .btn-del-prod:hover { opacity:1; border-color:var(--red); background:rgba(224,82,82,0.05); }

    /* Add product */
    .btn-add-prod {
      width:100%; padding:11px; margin-top:8px;
      border:1px dashed var(--bord2); border-radius:12px;
      color:var(--gold); font-size:0.82rem;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:var(--tr);
    }
    .btn-add-prod:hover { background:rgba(200,164,78,0.04); border-color:var(--gold); }

    /* ── SAVE FAB (remplace save-bar) ── */
    .save-bar { display:none; } /* gardé pour compatibilité JS, masqué visuellement */
    #fab-save {
      position:fixed; bottom:28px; right:20px;
      width:60px; height:60px; border-radius:50%;
      background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));
      color:#0c0a08;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 6px 24px rgba(200,164,78,0.45), 0 2px 8px rgba(0,0,0,0.4);
      z-index:200; border:none; cursor:pointer;
      transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
    }
    #fab-save:hover { transform:translateY(-3px) scale(1.06); box-shadow:0 12px 32px rgba(200,164,78,0.55); }
    #fab-save:active { transform:scale(0.93); }
    #fab-save svg { width:26px; height:26px; }
    /* Pulse quand il y a des modifs non sauvegardées */
    #fab-save.unsaved { animation:fab-pulse 2s ease-in-out infinite; }
    @keyframes fab-pulse {
      0%,100%{ box-shadow:0 6px 24px rgba(200,164,78,0.45); }
      50%{ box-shadow:0 6px 32px rgba(200,164,78,0.8), 0 0 0 8px rgba(200,164,78,0.12); }
    }
    /* Tooltip au survol */
    #fab-save::before {
      content:attr(title);
      position:absolute; right:68px; top:50%; transform:translateY(-50%);
      background:var(--bg3); border:1px solid var(--bord2); border-radius:8px;
      padding:6px 12px; font-size:0.76rem; color:var(--cream); white-space:nowrap;
      opacity:0; pointer-events:none; transition:opacity 0.2s;
    }
    #fab-save:hover::before { opacity:1; }

    /* ── BOUTON SAUVEGARDE CATÉGORIES ── */
    .btn-save-cats {
      width:100%; padding:13px; margin-top:10px;
      background:rgba(200,164,78,0.08); border:1px solid var(--bord2); border-radius:14px;
      color:var(--gold); font-size:0.86rem; font-weight:500; letter-spacing:0.04em;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:var(--tr); min-height:48px;
    }
    .btn-save-cats:hover { background:rgba(200,164,78,0.14); border-color:var(--gold); }
    .btn-save-cats:active { transform:scale(0.97); }

    /* ── GLOBAL TRANSLATE BAR ── */
    .global-src-sel {
      background:var(--bg3); border:1px solid rgba(126,189,106,0.3); border-radius:8px;
      color:var(--green); font-size:0.76rem; padding:6px 10px; outline:none; cursor:pointer;
      min-height:32px;
    }
    .global-src-sel option { background:#181612; color:var(--cream); }
    .btn-translate-global {
      padding:7px 14px; border-radius:10px;
      border:1px solid rgba(126,189,106,0.4);
      color:var(--green); background:rgba(126,189,106,0.08);
      font-size:0.76rem; font-weight:500;
      display:flex; align-items:center; gap:6px;
      transition:var(--tr); white-space:nowrap; min-height:32px;
    }
    .btn-translate-global:hover:not(:disabled) { background:rgba(126,189,106,0.15); border-color:var(--green); }
    .btn-translate-global:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-translate-global.loading { animation:tl-pulse 1s ease-in-out infinite; }
    .global-progress {
      padding:4px 16px 0; font-size:0.74rem; color:var(--green);
      min-height:0; width:100%; transition:opacity 0.3s;
    }

    /* Lang tabs */
    .lang-tabs {
      display:flex; gap:4px; margin-bottom:12px;
      overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;
      padding-bottom:2px;
    }
    .lang-tabs::-webkit-scrollbar { display:none; }
    .lang-tab {
      padding:7px 13px; border-radius:8px; border:1px solid var(--border);
      color:var(--muted); font-size:0.74rem; transition:var(--tr);
      white-space:nowrap; flex-shrink:0; min-height:34px;
    }
    .lang-tab.on { border-color:var(--gold); color:var(--gold); background:rgba(200,164,78,0.08); }

    @keyframes tl-pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    .lang-fields { display:none; }
    .lang-fields.on { display:block; }

    /* Divider */
    .form-divider { height:1px; background:var(--border); margin:14px 0; }

    /* Form inputs larger touch targets */
    .form-input, .form-textarea, .form-select { padding:12px 14px; }
    .form-input { min-height:44px; }

    /* Product actions larger */
    .btn-save-prod { padding:13px; min-height:46px; }
    .btn-del-prod { padding:13px 18px; min-height:46px; }
    .btn-add-prod { min-height:46px; padding:13px; }
  </style>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <!-- ✅ Configuration centralisée — modifier uniquement firebase-config.js -->
  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(FIREBASE_CONFIG);
    const _db = firebase.database();
  </script>
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Mozart Café</div>
    <div class="login-sub">Administration</div>
    <input type="password" class="login-input" id="pwd-input"
           placeholder="Mot de passe" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Connexion</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     ADMIN INTERFACE
══════════════════════════════════════ -->
<header class="adm-header" id="adm-header" style="display:none">
  <div>
    <div class="adm-logo">Mozart Café</div>
    <div class="adm-sub">Administration du menu</div>
  </div>
  <div class="adm-center">
    <select class="global-src-sel" id="global-src-lang">
      <option value="fr">🇫🇷 Français</option>
      <option value="en">🇬🇧 English</option>
      <option value="el">🇬🇷 Ελληνικά</option>
      <option value="ar">🇸🇦 العربية</option>
      <option value="de">🇩🇪 Deutsch</option>
    </select>
    <button class="btn-translate-global" id="btn-translate-all">
      🌐 Traduire toutes les autres langues
    </button>
  </div>
  <div class="adm-right">
    <button class="btn-preview" onclick="window.open('index.html','_blank')">👁 Voir le menu</button>
    <button class="btn-logout" id="logout-btn">Déconnexion</button>
  </div>
</header>

<div class="adm-wrap" id="adm-wrap" style="display:none">

  <!-- ── PROGRESSION TRADUCTION ── -->
  <div class="global-progress" id="global-progress"></div>

  <!-- ── INFORMATIONS DU CAFÉ ── -->
  <div class="adm-section">
    <div class="sec-hd">Informations du café <span class="sec-badge">Footer</span></div>
    <div class="info-card" id="info-card">

let adminData = null;  // { cats, items, info }
let currentLang = localStorage.getItem('mc_admin_lang') || 'el';
let unsaved = false;

/* ═══════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════ */
function checkLogin() {
  const saved = sessionStorage.getItem('mc_admin_auth');
  if (saved === 'ok') showAdmin();
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem('mc_admin_auth');
  location.reload();
});

function doLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === ADMIN_PASSWORD) {
    sessionStorage.setItem('mc_admin_auth', 'ok');
    showAdmin();
  } else {
    document.getElementById('login-err').textContent = 'Mot de passe incorrect.';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

function showAdmin() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('adm-header').style.display = '';
  document.getElementById('adm-wrap').style.display   = '';
  document.getElementById('fab-save').style.display   = '';
  // Sync dropdown avec la langue mémorisée
  const sel = document.getElementById('global-src-lang');
  if (sel) sel.value = currentLang;
  // Brancher le sélecteur de langue global (dans le header)
  sel.addEventListener('change', e => {
    setGlobalLang(e.target.value);
  });
  // loadData() est async — renderAll() et applyAdminUI() sont appelés à l'intérieur
  loadData();
}

/* ═══════════════════════════════════════════
   DONNÉES
═══════════════════════════════════════════ */
function loadData() {
  _db.ref('menu').once('value')
    .then(snapshot => {
      const data = snapshot.val();
      if (data && data.cats && data.cats.length > 0) {
        adminData = data;
        if (!adminData.info)  adminData.info  = JSON.parse(JSON.stringify(DEFAULT_INFO));
        if (!adminData.items) adminData.items = getDefaultItems();
      } else {
        adminData = {
          cats:  JSON.parse(JSON.stringify(DEFAULT_CATS)),
          info:  JSON.parse(JSON.stringify(DEFAULT_INFO)),
          items: getDefaultItems()
        };
      }
      renderAll();
      applyAdminUI(currentLang);
    })
    .catch(() => {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) adminData = JSON.parse(raw);
      } catch(_) {}
      if (!adminData.cats) adminData = {
        cats:  JSON.parse(JSON.stringify(DEFAULT_CATS)),
        info:  JSON.parse(JSON.stringify(DEFAULT_INFO)),
        items: getDefaultItems()
      };
      renderAll();
      applyAdminUI(currentLang);
    });
}

function sanitizeItems(items) {
  return (items || []).map(item => ({
    id:        item.id ?? 0,
    cat:       item.cat ?? 0,
    price:     item.price ?? '',
    photo:     item.photo ?? '',
    badges:    Array.isArray(item.badges) ? item.badges : [],
    name:      item.name      || { fr:'', en:'', el:'', ar:'', de:'' },
    desc:      item.desc      || { fr:'', en:'', el:'', ar:'', de:'' },
    full:      item.full      || { fr:'', en:'', el:'', ar:'', de:'' },
    allergens: item.allergens || { fr:[], en:[], el:[], ar:[], de:[] },
  }));
}

function saveData() {
  adminData.items = sanitizeItems(adminData.items);
  _db.ref('menu').set(adminData)
    .then(() => {
      localStorage.setItem(STORE_KEY, JSON.stringify(adminData));
      unsaved = false;
      document.getElementById('fab-save').classList.remove('unsaved');
      showToast((ADMIN_UI[currentLang]||ADMIN_UI.fr).toastSaved);
    })
    .catch(() => {
      localStorage.setItem(STORE_KEY, JSON.stringify(adminData));
      unsaved = false;
      document.getElementById('fab-save').classList.remove('unsaved');
      showToast('⚠️ Sauvegarde locale uniquement (pas de connexion)');
    });
}

function markUnsaved() {
  unsaved = true;
  document.getElementById('fab-save').classList.add('unsaved');
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ═══════════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════════ */
function renderAll() {
  renderInfoSection();
  renderCatsSection();
  renderProductsSection();
}

/* ─── SECTION INFO ─── */
function renderInfoSection() {
  const card = document.getElementById('info-card');
  const fields = [
    { key:'wifi_name',  label:'WiFi — Nom' },
    { key:'wifi_val',   label:'WiFi — Mot de passe' },
    { key:'hours_name', label:'Horaires — Titre' },
    { key:'hours_val',  label:'Horaires — Valeur' },
    { key:'addr_name',  label:'Adresse — Titre' },
    { key:'addr_val',   label:'Adresse — Valeur' },
  ];

  let html = `<div></div>`;

  fields.forEach(f => {
    html += `<div class="info-row">
      <div class="info-lbl">${f.label}</div>
      <div class="info-inputs">`;
    LANGS.forEach(l => {
      html += `<input class="info-input info-field-${l}${l===currentLang?'':' hide'}"
        style="${l!==currentLang?'display:none':''}"
        data-field="${f.key}" data-lang="${l}"
        value="${esc(adminData.info[f.key]?.[l] || '')}"
        placeholder="${f.label} (${l.toUpperCase()})">`;
    });
    html += `</div></div>`;
  });

  card.innerHTML = html;

  card.querySelectorAll('.info-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const { field, lang } = e.target.dataset;
      if (!adminData.info[field]) adminData.info[field] = {};
      adminData.info[field][lang] = e.target.value;
      markUnsaved();
    });
  });

}

/* ─── APPLIQUER LES TEXTES UI DANS LA LANGUE CHOISIE ─── */

  const t = ADMIN_UI[l] || ADMIN_UI.fr;
  const $ = id => document.getElementById(id);

  // Header
  const sub = document.querySelector('.adm-sub');
  if (sub) sub.textContent = t.admSub;

function renderCatsSection() {
  const list = document.getElementById('cats-list');
  document.getElementById('cat-count').textContent = adminData.cats.length;
  list.innerHTML = '';

  // Lignes de catégories
  adminData.cats.forEach((cat, ci) => {
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.dataset.ci = ci;

    const iconOptions = ICONS.map(ic =>
      `<option value="${ic}"${cat.ico===ic?' selected':''}>${getIconLabel(ic)}</option>`
    ).join('');

    row.innerHTML = `
      <div class="cat-row-ico">
        <svg width="18" height="18"><use href="#${cat.ico}"/></svg>
      </div>
      <input class="inline-input" value="${esc(cat.names?.[currentLang] || cat.names?.fr || '')}"
        placeholder="Nom (${currentLang.toUpperCase()})"
        data-ci="${ci}">
      <select class="icon-select" data-ci="${ci}">${iconOptions}</select>
      <button class="btn-del" data-ci="${ci}" title="Supprimer">✕</button>
    `;
    list.appendChild(row);

    // Mise à jour du nom dans la langue active
    row.querySelector('.inline-input').addEventListener('input', e => {
      const i = parseInt(e.target.dataset.ci);
      if (!adminData.cats[i].names) adminData.cats[i].names = {};
      adminData.cats[i].names[currentLang] = e.target.value;
      markUnsaved();
      renderProductsSection();
    });

    row.querySelector('.icon-select').addEventListener('change', e => {
      const i = parseInt(e.target.dataset.ci);
      adminData.cats[i].ico = e.target.value;
      // Mettre à jour l'icône affichée
      row.querySelector('.cat-row-ico svg use').setAttribute('href', '#' + e.target.value);
      markUnsaved();
    });

    row.querySelector('.btn-del').addEventListener('click', e => {
      const i = parseInt(e.target.dataset.ci);
      if (!confirm(`Supprimer la catégorie "${adminData.cats[i].names?.fr || i}" et tous ses produits ?`)) return;
      adminData.items = adminData.items.filter(it => it.cat !== i);
      adminData.items.forEach(it => { if (it.cat > i) it.cat--; });
      adminData.cats.splice(i, 1);
      markUnsaved();
      renderCatsSection();
      renderProductsSection();
    });
  });
}

function renderProductsSection() {

    const catItems = adminData.items.filter(it => it.cat === ci);

    sec.className = 'cat-products';

    sec.innerHTML = `
      <div class="cat-products-hd">
        <svg width="16" height="16" style="color:var(--gold)"><use href="#${cat.ico}"/></svg>

    const list = sec.querySelector(`#prod-list-${ci}`);

function renderProdCard(container, item, ci) {
  const card = document.createElement('div');
  card.className = 'prod-card';
  card.dataset.id = item.id;

  const imgSrc = item.photo
    ? (item.photo.startsWith('data:') ? item.photo : `https://images.unsplash.com/${item.photo}?w=200&h=200&fit=crop`)
    : 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=200&h=200&fit=crop';

  card.innerHTML = `
    <div class="prod-card-top">
      <img class="prod-thumb" src="${imgSrc}" alt="">
      <div class="prod-top-info">
        <div class="prod-top-name">${esc(item.name?.[currentLang] || item.name?.fr || 'Produit')}</div>
        <div class="prod-top-price">${esc(item.price || '')}</div>
      </div>
      <div class="prod-expand-ico"><svg><use href="#ico-up"/></svg></div>
    </div>
    <div class="prod-card-body">
      ${buildProdForm(item)}
    </div>
  `;
  container.appendChild(card);

  // Toggle expand
  card.querySelector('.prod-card-top').addEventListener('click', () => {
    card.classList.toggle('open');
  });

  // Lang tabs inside product
  card.querySelectorAll('.prod-lang-tab').forEach(tab => {
    tab.addEventListener('click', e => {
      const l = e.target.dataset.l;
      card.querySelectorAll('.prod-lang-tab').forEach(t => t.classList.toggle('on', t.dataset.l === l));
      card.querySelectorAll('.prod-lang-fields').forEach(f => f.classList.toggle('on', f.dataset.lang === l));
    });
  });

  // Photo ID/URL input → update preview (Unsplash only)
  card.querySelector('.photo-id-input').addEventListener('input', e => {
    const val = e.target.value.trim();
    if (!val) { card.querySelector('.photo-preview').style.display = 'none'; return; }
    const id = val.replace('https://images.unsplash.com/','').split('?')[0];
    const src = `https://images.unsplash.com/${id}?w=600&h=400&fit=crop`;
    const prev = card.querySelector('.photo-preview');
    prev.src = src; prev.style.display = '';
    card.querySelector('.prod-thumb').src = `https://images.unsplash.com/${id}?w=200&h=200&fit=crop`;
    // Clear any stored base64 when user types an Unsplash ID
    item._photoBase64 = null;
  });

  // Upload depuis l'appareil → base64
  card.querySelector('.photo-file-input').addEventListener('change', e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const b64 = ev.target.result;
      item._photoBase64 = b64;
      const prev = card.querySelector('.photo-preview');
      prev.src = b64; prev.style.display = '';
      card.querySelector('.prod-thumb').src = b64;
      card.querySelector('.photo-id-input').value = '';
    };
    reader.readAsDataURL(file);
  });

  // Clear photo
  card.querySelector('.btn-clear-photo').addEventListener('click', () => {
    item._photoBase64 = null;
    card.querySelector('.photo-id-input').value = '';
    const prev = card.querySelector('.photo-preview');
    prev.src = ''; prev.style.display = 'none';
    card.querySelector('.prod-thumb').src = 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=200&h=200&fit=crop';
  });

  // Delete product
  card.querySelector('.btn-del-prod').addEventListener('click', () => {
    if (!confirm('Supprimer ce produit ?')) return;
    const idx = adminData.items.findIndex(it => it.id === item.id);
    if (idx > -1) adminData.items.splice(idx, 1);
    card.remove();
    // Update count
    renderCatsSection();
    renderProductsSection();
    markUnsaved();
  });
}

function collectProdForm(card, item) {
  // Price
  const priceEl = card.querySelector('[data-field="price"]');
  if (priceEl) item.price = priceEl.value.trim();

  // Photo : priorité au base64 uploadé, sinon ID Unsplash
  if (item._photoBase64) {
    item.photo = item._photoBase64;
    item._photoBase64 = null;
  } else {
    const photoEl = card.querySelector('.photo-id-input');
    if (photoEl) {
      let val = photoEl.value.trim();
      val = val.replace('https://images.unsplash.com/','').split('?')[0];
      item.photo = val;
    }
  }

  // Badges
  item.badges = [];
  card.querySelectorAll('[data-badge]').forEach(chk => {
    if (chk.checked) item.badges.push(chk.dataset.badge);
  });

  // Multilang fields
  if (!item.name) item.name = {};
  if (!item.desc) item.desc = {};
  if (!item.full) item.full = {};
  if (!item.allergens) item.allergens = {};

  card.querySelectorAll('[data-field][data-lang]').forEach(el => {
    const { field, lang } = el.dataset;
    if (field === 'allergens') {
      item.allergens[lang] = el.value.split(',').map(s => s.trim()).filter(Boolean);
    } else {
      if (!item[field]) item[field] = {};
      item[field][lang] = el.value;
    }
  });
}

function addProduct(ci) {
  const id = Date.now();
  const newItem = {
    id, cat: ci,
    price: '€0.00',
    photo: 'photo-1509042239860-f550ce710b93',
    badges: [],
    name: {}, desc: {}, full: {}, allergens: {}
  };
  LANGS.forEach(l => {
    newItem.name[l]      = 'Nouveau produit';
    newItem.desc[l]      = '';
    newItem.full[l]      = '';
    newItem.allergens[l] = [];
  });
  adminData.items.push(newItem);
  markUnsaved();
  renderProductsSection();
  // Scroll to new card and open it
  setTimeout(() => {
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) { card.classList.add('open'); card.scrollIntoView({ behavior:'smooth', block:'center' }); }
  }, 100);
}

/* ═══════════════════════════════════════════
   GLOBAL TRANSLATE — traduit TOUT en une fois
   Catégories + tous les produits + infos café
═══════════════════════════════════════════ */
document.getElementById('btn-translate-all').addEventListener('click', async () => {
  const srcLang  = document.getElementById('global-src-lang').value;
  const targets  = LANGS.filter(l => l !== srcLang);
  const btn      = document.getElementById('btn-translate-all');
  const progress = document.getElementById('global-progress');

  // Vérifier qu'il y a du contenu à traduire
  const hasContent =
    adminData.cats.some(c => (c.names?.[srcLang] || '').trim()) ||
    adminData.items.some(it => (it.name?.[srcLang] || '').trim());

  if (!hasContent) {
    showToast('⚠ Remplissez d\'abord les champs dans la langue source ' + LANG_LABELS[srcLang]);
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '⏳ Traduction en cours…';

  const infoFields = ['wifi_name','wifi_val','hours_name','hours_val','addr_name','addr_val'];
  const prodFields = ['name','desc','full'];
  let totalDone = 0;
  const totalTargets = targets.length;

  for (const toLang of targets) {
    totalDone++;
    progress.textContent = `→ ${LANG_LABELS[toLang]} (${totalDone}/${totalTargets}) — Catégories…`;

    // 1. Traduire les catégories
    for (const cat of adminData.cats) {
      const srcName = (cat.names?.[srcLang] || '').trim();
      if (!srcName) continue;
      try {
        const translated = await translateText(srcName, srcLang, toLang);
        if (translated) {
          if (!cat.names) cat.names = {};
          cat.names[toLang] = translated;
        }
      } catch(_) {}
      await sleep(150);
    }

    progress.textContent = `→ ${LANG_LABELS[toLang]} (${totalDone}/${totalTargets}) — Produits…`;

    // 2. Traduire les produits
    for (const item of adminData.items) {
      for (const field of prodFields) {
        const srcText = (item[field]?.[srcLang] || '').trim();
        if (!srcText) continue;
        try {
          const translated = await translateText(srcText, srcLang, toLang);
          if (translated) {
            if (!item[field]) item[field] = {};
            item[field][toLang] = translated;
          }
        } catch(_) {}
        await sleep(200);
      }
      // Allergènes (tableau → string → traduit → retableau)
      const srcAl = (item.allergens?.[srcLang] || []).join(', ');
      if (srcAl.trim()) {
        try {
          const translated = await translateText(srcAl, srcLang, toLang);
          if (translated) {
            if (!item.allergens) item.allergens = {};
            item.allergens[toLang] = translated.split(',').map(s => s.trim()).filter(Boolean);
          }
        } catch(_) {}
        await sleep(150);
      }
    }

    progress.textContent = `→ ${LANG_LABELS[toLang]} (${totalDone}/${totalTargets}) — Infos café…`;

    // 3. Traduire les infos café
    for (const field of infoFields) {
      const srcText = (adminData.info[field]?.[srcLang] || '').trim();
      if (!srcText) continue;
      try {
        const translated = await translateText(srcText, srcLang, toLang);
        if (translated) {
          if (!adminData.info[field]) adminData.info[field] = {};
          adminData.info[field][toLang] = translated;
        }
      } catch(_) {}
      await sleep(150);
    }
  }

  btn.disabled = false;
  btn.classList.remove('loading');
  btn.innerHTML = '🌐 Traduire toutes les autres langues';
  progress.textContent = '✓ Traduction terminée — pensez à sauvegarder !';
  setTimeout(() => { progress.textContent = ''; }, 6000);
  markUnsaved();
  renderAll();
});

   full:{fr:'Notre trio de houmous est préparé chaque matin avec des pois chiches bio de Farsala (Thessalie), trempés 12h. Tahin d\'un moulin artisanal de Jérusalem. Classique : citron de Menton. Betterave : betteraves macédoniennes rôties. Poivron : poivrons au four à bois, paprika fumé de La Vera. Pita sortie du four toutes les 30 minutes.',en:'Our hummus trio is prepared each morning with organic chickpeas from Farsala, Thessaly, soaked 12h. Tahini from a Jerusalem artisan mill. Classic: Menton lemon. Beetroot: roasted Macedonian beets. Pepper: wood-oven roasted peppers, La Vera smoked paprika. House pita every 30 minutes.',el:'Βιολογικά ρεβίθια Φαρσάλων, 12 ώρες. Ταχίνι Ιερουσαλήμ. Κλασικό: λεμόνι. Παντζάρι: ψητό. Πιπεριά: ξυλόφουρνος.',ar:'حمص عضوي من فارسالا، نقع 12 ساعة. طحينة أورشليم. كلاسيكي: ليمون. شمندر: مشوي. فلفل: فرن خشبي.',de:'Bio-Kichererbsen aus Farsala, 12h. Jerusalem-Tahini. Klassisch: Menton-Zitrone. Rübe: geröstete Bete. Paprika: Holzofen.'},

   full:{fr:'Le Mozart Café Signature est le fruit de deux ans de sélection par nos sommeliers. Blend 60/40 : arabica Yirgacheffe Éthiopie (floral, fruits exotiques) et Huila Colombie (caramel, amandes). Torréfié en 16 minutes dans notre brûlerie partenaire de Kifissia. Servi en lungo dans une tasse chauffée avec twist d\'orange Moro de Sicile. Carré de chocolat Valrhona offert.',en:'The Mozart Café Signature is the result of two years of selection by our coffee sommeliers. 60/40 blend: Yirgacheffe Ethiopia (floral, exotic fruits) and Huila Colombia (caramel, almonds). Slow-roasted 16 minutes. Served as a lungo in a heated cup with Sicilian Moro orange twist. Complimentary Valrhona chocolate square.',el:'Δύο χρόνια επιλογής. Blend 60/40 Yirgacheffe Αιθιοπίας και Huila Κολομβίας. Lungo με twist πορτοκαλιού, Valrhona.',ar:'نتيجة عامين من الاختيار. مزيج 60/40 يرغاشيف وهويلا. لونغو مع قشر برتقال وشوكولاتة فالرهونا.',de:'Ergebnis zweijähriger Selektion. 60/40 Yirgacheffe und Huila. Lungo mit Orangen-Twist und Valrhona.'},

  {id:18,cat:3,price:'€7.50',photo:'photo-1558857563-b371033873b8',badges:['vegan'],

   desc:{fr:'Lait de coco de Thaïlande, curcuma de Ceylan, gingembre frais, poivre noir et miel de l\'Hymette.',en:'Thai coconut milk, Ceylon turmeric, fresh ginger, black pepper and Hymettus honey.',el:'Γάλα καρύδας Ταϊλάνδης, κουρκουμάς Κεϋλάνης, φρέσκος τζίντζερ, πιπέρι και μέλι Υμηττού.',ar:'حليب جوز هند تايلاندي وكركم سيلاني وزنجبيل طازج وفلفل أسود وعسل أثيني.',de:'Thailändische Kokosmilch, Ceylon-Kurkuma, frischer Ingwer, schwarzer Pfeffer, Hymettus-Honig.'},
   full:{fr:'Le Golden Milk ayurvédique est préparé avec curcuma bio Grade A de Ceylan. Notre recette : lait de coco entier de Thaïlande (sans émulsifiant), gingembre frais bio râpé, poivre noir du Kerala (×20 absorption de curcumine), cardamome de Guatemala et miel de thym brut de l\'Hymette — le miel le plus précieux de Grèce. Chauffé à 72°C.',en:'Ayurvedic Golden Milk prepared with Grade A organic Ceylon turmeric. Our recipe: whole Thai coconut milk, freshly grated organic ginger, Kerala black pepper (×20 curcumin absorption), Guatemalan cardamom and raw Hymettus thyme honey — Greece\'s most precious honey. Heated to 72°C.',el:'Βιολογικός κουρκουμάς Grade A Κεϋλάνης. Γάλα καρύδας Ταϊλάνδης, τζίντζερ, πιπέρι Kerala (×20), κάρδαμο, μέλι Υμηττού.',ar:'كركم عضوي Grade A من سيلان. حليب جوز هند تايلاندي، زنجبيل، فلفل كيرالا (×20)، هيل، عسل أثيني.',de:'Bio-Kurkuma Grade A aus Ceylon. Thai-Kokosmilch, Bio-Ingwer, Kerala-Pfeffer (×20), Kardamom, Hymettus-Rohhonig.'},

  {id:19,cat:3,price:'€14.00',photo:'photo-1504674900247-0877df9cc836',badges:['popular','new'],
   name:{fr:'Brunch Board Mozart',en:'Mozart Brunch Board',el:'Brunch Board Mozart',ar:'طبق برنش موزارت',de:'Mozart Brunch Board'},
   desc:{fr:'Un plateau royal : œuf parfait, saumon fumé d\'Écosse, avocat, feta d\'Égine et tartines grillées.',en:'A royal board: perfect egg, Scottish smoked salmon, avocado, Aegina feta and grilled toasts.',el:'Βασιλικό πλατό: τέλειο αυγό, καπνιστός σολομός Σκωτίας, αβοκάντο, φέτα Αίγινας.',ar:'طبق ملكي: بيضة مثالية وسلمون مدخن اسكتلندي وأفوكادو وفيتا إيجينا.',de:'Königliches Board: perfektes Ei, schottischer Räucherlachs, Avocado, Aegina-Feta.'},
   full:{fr:'Le Brunch Board Mozart est notre pièce maîtresse du week-end. Œuf poché à 63°C en sous-vide 45 min, saumon fumé à froid 24h d\'Écosse (AOC), avocat Hass tranché, feta AOP d\'Égine émiettée, tartines de pain de seigle au levain grillées, quenelle de fromage de chèvre de Macédoine avec compotée de figues de Kalamata. Jus d\'agrumes pressés et café Mozart inclus.',en:'The Mozart Brunch Board is our weekend showpiece. 63°C sous-vide egg 45 min, Scottish 24h cold-smoked salmon (AOC), sliced Hass avocado, crumbled Aegina AOP feta, grilled sourdough rye toasts, quenelle of Macedonian goat cheese with Kalamata fig compote. Freshly pressed citrus juice and Mozart coffee included.',el:'Αυγό sous-vide 63°C 45 λεπτά. Σολομός Σκωτίας, αβοκάντο Hass, φέτα Αίγινας, ψωμί σίκαλης, κατσικίσιο τυρί Μακεδονίας με σύκο Καλαμάτας.',ar:'بيضة سوس-فيد 63°C لـ45 دقيقة. سلمون اسكتلندي، أفوكادو هاس، فيتا إيجينا، خبز جاودار، جبن ماعز مقدوني مع تين.',de:'63°C Sous-Vide-Ei 45 Min. Schottischer Räucherlachs, Hass-Avocado, Aegina-Feta, Roggenbrot, mazedonischer Ziegenkäse.'},

  {id:20,cat:3,price:'€6.50',photo:'photo-1551024506-0bccd828d307',badges:[],
   name:{fr:'Tiramisu Maison',en:'House Tiramisu',el:'Σπιτικό Τιραμισού',ar:'تيراميسو البيت',de:'Hausgemachtes Tiramisu'},

/* ═══════════════════════════════════════════
   TRADUCTION AUTOMATIQUE — MyMemory API (gratuite)
   Limite : ~5000 mots/jour par adresse IP.
   Pour un usage professionnel intensif, ajoutez
   votre email en paramètre de-a pour 10x plus.
═══════════════════════════════════════════ */

// Codes langue pour MyMemory
const MYMEMORY_CODES = { fr:'fr-FR', en:'en-GB', el:'el-GR', ar:'ar-SA', de:'de-DE' };

async function translateText(text, fromLang, toLang) {
  if (!text || !text.trim()) return '';
  if (fromLang === toLang) return text;

  const src = MYMEMORY_CODES[fromLang] || fromLang;
  const tgt = MYMEMORY_CODES[toLang]   || toLang;

  // MyMemory a une limite de 500 chars par requête — on découpe si nécessaire
  if (text.length <= 500) {
    return await myMemoryCall(text, src, tgt);
  }

  // Découper par phrases pour les textes longs
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  const chunks = [];
  let current = '';
  for (const s of sentences) {
    if ((current + s).length > 480) {
      if (current) chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());

  const results = [];
  for (const chunk of chunks) {
    const translated = await myMemoryCall(chunk, src, tgt);
    results.push(translated || chunk);
    await sleep(150);
  }
  return results.join(' ');
}

async function myMemoryCall(text, src, tgt) {
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  if (data.responseStatus === 200 && data.responseData?.translatedText) {
    return data.responseData.translatedText;
  }
  throw new Error('Translation failed: ' + (data.responseDetails || 'unknown'));
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

   UTILS
═══════════════════════════════════════════ */
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
