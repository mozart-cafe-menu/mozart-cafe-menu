<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#09080f"/>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c070"/>
      <stop offset="50%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#9b7c30"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1630"/>
      <stop offset="100%" style="stop-color:#09080f"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="200" fill="url(#bg)" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Top ornament -->
  <line x1="180" y1="140" x2="220" y2="140" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="140" r="4" fill="#c9a84c" opacity="0.6"/>
  <line x1="292" y1="140" x2="332" y2="140" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Musical note stem -->
  <rect x="246" y="165" width="22" height="140" rx="4" fill="url(#g)"/>
  <!-- Musical note flag (curved) -->
  <path d="M268 165 Q320 185 318 230 Q316 250 268 248" fill="none" stroke="url(#g)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Musical note head (filled oval) -->
  <ellipse cx="228" cy="305" rx="38" ry="26" transform="rotate(-15,228,305)" fill="url(#g)"/>
  <!-- Shine on note head -->
  <ellipse cx="218" cy="296" rx="12" ry="8" transform="rotate(-15,218,296)" fill="#fff" fill-opacity="0.18"/>
  <!-- Bottom ornament -->
  <line x1="190" y1="390" x2="230" y2="390" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="282" y1="390" x2="322" y2="390" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.35"/>
  <circle cx="256" cy="390" r="3" fill="#c9a84c" opacity="0.4"/>
</svg>
